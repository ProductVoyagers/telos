<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Today - Telos</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f5f5f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    min-height: 100vh;
  }

  body.embed { padding: 0; }
  body.embed .screen-topbar { display: none; }
  body.embed .phone-frame { box-shadow: none; border: none; border-radius: 0; }

  .screen-topbar {
    width: 100%;
    max-width: 600px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .screen-topbar .nav-left { display: flex; align-items: center; gap: 10px; }
  .screen-topbar .back-link {
    width: 32px; height: 32px;
    border-radius: 8px; background: #e8e8e8;
    display: flex; align-items: center; justify-content: center;
    text-decoration: none; color: #555;
  }
  .screen-topbar .back-link:hover { background: #ddd; }
  .screen-topbar .back-link svg { width: 18px; height: 18px; }
  .screen-topbar .breadcrumb { font-size: 13px; color: #999; }
  .screen-topbar .breadcrumb a { color: #999; text-decoration: none; }
  .screen-topbar .breadcrumb a:hover { color: #0066ff; }
  .screen-topbar .breadcrumb .current { color: #1a1a1a; font-weight: 600; }
  .download-btn {
    padding: 10px 24px; background: #1a1a1a; color: #fff; border: none;
    border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; gap: 8px; font-family: inherit;
  }
  .download-btn:hover { background: #333; }
  .download-btn svg { width: 16px; height: 16px; }

  .phone-frame {
    width: 375px; height: 812px; background: #fff; border-radius: 40px;
    overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    position: relative; border: 8px solid #1a1a1a;
    display: flex; flex-direction: column;
  }

  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 24px 4px; font-size: 14px; font-weight: 600; flex-shrink: 0;
  }
  .status-bar .time { font-weight: 700; }
  .status-icons { display: flex; gap: 4px; align-items: center; }
  .status-icons svg { width: 16px; height: 16px; }

  /* App header */
  .app-header { padding: 14px 20px 6px; flex-shrink: 0; }
  .app-header .greeting { font-size: 14px; color: #888; }
  .app-header h1 { font-size: 26px; font-weight: 800; color: #1a1a1a; margin-top: 2px; }

  /* Streak banner */
  .streak {
    margin: 12px 20px 4px; padding: 14px 16px; border-radius: 14px;
    background: #f7f7f8; display: flex; align-items: center; gap: 12px; flex-shrink: 0;
  }
  .streak .flame { font-size: 28px; }
  .streak .streak-text { font-size: 14px; color: #555; }
  .streak .streak-text strong { color: #1a1a1a; font-weight: 800; font-size: 16px; }
  .streak .progress { margin-left: auto; font-size: 13px; font-weight: 700; color: #0066ff; }

  /* Habit list */
  .section-label {
    font-size: 12px; font-weight: 700; letter-spacing: 0.6px; text-transform: uppercase;
    color: #aaa; padding: 16px 20px 8px; flex-shrink: 0;
  }
  .habit-list { flex: 1; overflow-y: auto; padding: 0 20px 16px; }
  .habit {
    display: flex; align-items: center; gap: 14px; padding: 16px 0; border-bottom: 1px solid #f0f0f0;
  }
  .habit .icon {
    width: 44px; height: 44px; border-radius: 12px; background: #f0f4ff;
    display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0;
  }
  .habit .info { flex: 1; min-width: 0; }
  .habit .info .name { font-size: 16px; font-weight: 700; color: #1a1a1a; }
  .habit .info .meta { font-size: 13px; color: #888; margin-top: 2px; }
  .habit .check {
    width: 30px; height: 30px; border-radius: 50%; border: 2px solid #ddd;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .habit .check svg { width: 16px; height: 16px; color: #fff; }
  .habit.done .check { background: #0066ff; border-color: #0066ff; }
  .habit.done .name { color: #aaa; text-decoration: line-through; }

  /* Bottom tab bar */
  .tab-nav {
    display: flex; border-top: 1px solid #f0f0f0; flex-shrink: 0; padding: 8px 0 14px;
  }
  .tab-nav .tab {
    flex: 1; text-align: center; font-size: 11px; color: #aaa; display: flex;
    flex-direction: column; align-items: center; gap: 3px;
  }
  .tab-nav .tab.active { color: #0066ff; font-weight: 700; }
  .tab-nav .tab svg { width: 22px; height: 22px; }
</style>
</head>
<body>

<div class="screen-topbar">
  <div class="nav-left">
    <a class="back-link" href="../../index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
    </a>
    <div class="breadcrumb">
      <a href="../../index.html">Streak</a> / <span class="current">Today</span>
    </div>
  </div>
  <button class="download-btn" onclick="downloadImage()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    PNG
  </button>
</div>

<div class="phone-frame" id="capture">
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="status-icons">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.34V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
    </div>
  </div>

  <!-- App header -->
  <div class="app-header">
    <div class="greeting">Good morning, Sam</div>
    <h1>Today</h1>
  </div>

  <!-- Streak banner -->
  <div class="streak">
    <span class="flame">🔥</span>
    <div class="streak-text"><strong>5-day streak</strong><br>Keep it going</div>
    <div class="progress">2 / 4 done</div>
  </div>

  <div class="section-label">Today's habits</div>

  <!-- Habit list -->
  <div class="habit-list">
    <div class="habit done">
      <div class="icon">💧</div>
      <div class="info"><div class="name">Drink water</div><div class="meta">Morning · 8 glasses</div></div>
      <div class="check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M20 6L9 17l-5-5"/></svg></div>
    </div>
    <div class="habit done">
      <div class="icon">🧘</div>
      <div class="info"><div class="name">Meditate</div><div class="meta">Morning · 10 min</div></div>
      <div class="check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M20 6L9 17l-5-5"/></svg></div>
    </div>
    <div class="habit">
      <div class="icon">📖</div>
      <div class="info"><div class="name">Read</div><div class="meta">Evening · 20 pages</div></div>
      <div class="check"></div>
    </div>
    <div class="habit">
      <div class="icon">🏃</div>
      <div class="info"><div class="name">Run</div><div class="meta">Evening · 3 km</div></div>
      <div class="check"></div>
    </div>
  </div>

  <!-- Bottom tab nav -->
  <div class="tab-nav">
    <div class="tab active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
      Today
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      Habits
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Stats
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21v-2a4 4 0 014-4h8a4 4 0 014 4v2"/></svg>
      Me
    </div>
  </div>
</div>

<script>
  function downloadImage() {
    var el = document.getElementById('capture');
    html2canvas(el, { scale: 2, useCORS: true, backgroundColor: null, width: 375, height: 812, scrollX: 0, scrollY: 0 }).then(function(canvas) {
      var link = document.createElement('a');
      link.download = 'screen.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    });
  }
  if (location.search.includes('embed')) document.body.classList.add('embed');
</script>

</body>
</html>

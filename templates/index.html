<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telos</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #fafafa;
    color: #1a1a1a;
    min-height: 100vh;
  }

  /* Top bar */
  .topbar {
    background: #fff;
    border-bottom: 1px solid #eee;
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .topbar .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .topbar .logo-text {
    display: flex;
    flex-direction: column;
  }
  .topbar .logo-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .topbar .logo-icon img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }
  .topbar h1 {
    font-size: 20px;
    font-weight: 700;
    color: #1a1a1a;
  }
  .topbar h1 span { color: #888; font-weight: 400; }
  .topbar .meta {
    font-size: 13px;
    color: #999;
  }

  /* Main content */
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px;
  }

  /* Section */
  .section {
    margin-bottom: 40px;
  }
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .section-header h2 {
    font-size: 16px;
    font-weight: 600;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .section-header .count {
    font-size: 13px;
    color: #999;
    background: #f0f0f0;
    padding: 2px 10px;
    border-radius: 10px;
  }

  /* Project cards grid */
  .projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
  }

  .project-card {
    background: #fff;
    border-radius: 16px;
    border: 1px solid #eee;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .project-card:hover {
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    transform: translateY(-2px);
    border-color: #ddd;
  }

  .card-preview {
    height: 180px;
    background: #f5f5f5;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 20px;
    overflow: hidden;
  }
  .card-preview .screen-thumb {
    width: 80px;
    height: 140px;
    background: #fff;
    border-radius: 12px;
    border: 2px solid #e0e0e0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }
  .screen-thumb .th-header {
    height: 20px;
    background: #f8f8f8;
    border-bottom: 1px solid #eee;
  }
  .screen-thumb .th-body {
    flex: 1;
    padding: 6px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .screen-thumb .th-line {
    height: 4px;
    background: #e8e8e8;
    border-radius: 2px;
  }
  .screen-thumb .th-line.short { width: 60%; }
  .screen-thumb .th-line.green { background: #00a862; }
  .screen-thumb .th-btn {
    height: 10px;
    background: #00a862;
    border-radius: 3px;
    margin-top: auto;
  }

  .card-body {
    padding: 16px 20px;
  }
  .card-body h3 {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .card-body p {
    font-size: 13px;
    color: #888;
    margin-bottom: 12px;
  }
  .card-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .tag {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 12px;
    font-weight: 500;
  }
  .tag.screens {
    background: #e8f5e9;
    color: #2e7d32;
  }
  .tag.status-active {
    background: #e3f2fd;
    color: #1565c0;
  }
  .tag.status-draft {
    background: #fff3e0;
    color: #e65100;
  }

  /* Empty state for "add project" */
  .project-card.add-new {
    border: 2px dashed #ddd;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 270px;
  }
  .project-card.add-new:hover {
    border-color: #00a862;
    background: #f0faf0;
  }
  .add-new-content {
    text-align: center;
    color: #999;
  }
  .add-new-content .plus {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: #f0f0f0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    color: #999;
    margin: 0 auto 8px;
  }
  .project-card.add-new:hover .add-new-content { color: #00a862; }
  .project-card.add-new:hover .plus { background: #e8f5e9; color: #00a862; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-text">
      <h1>Telos</h1>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:20px;">
    <a href="how-it-works.html" style="font-size:13px;color:#888;text-decoration:none;font-weight:500;transition:color 0.15s;" onmouseover="this.style.color='#00a862'" onmouseout="this.style.color='#888'">How It Works</a>
    <div class="meta" id="team-label"></div>
  </div>
</div>

<div class="container">
  <div class="section">
    <div class="section-header">
      <h2>Projects</h2>
      <span class="count" id="project-count"></span>
    </div>
    <div class="projects-grid" id="projects-grid"></div>
  </div>
</div>

<script>
function buildThumb(variant) {
  var lines = [
    ['', 'short', 'green', '', 'short'],
    ['short', '', '', 'short', ''],
    ['', '', 'short', 'green', '']
  ];
  var set = lines[variant % lines.length];
  var html = '<div class="screen-thumb"><div class="th-header"></div><div class="th-body">';
  set.forEach(function(cls) {
    html += '<div class="th-line' + (cls ? ' ' + cls : '') + '"></div>';
  });
  html += '<div class="th-btn"></div></div></div>';
  return html;
}

function countScreens(project) {
  var total = 0;
  var flows = project.flows || {};
  Object.keys(flows).forEach(function(fk) {
    total += (flows[fk].screens || []).length;
  });
  return total;
}

fetch('manifest.json?t=' + Date.now())
  .then(function(r) { return r.json(); })
  .then(function(manifest) {
    document.getElementById('team-label').textContent = manifest.team || '';
    var grid = document.getElementById('projects-grid');
    var projects = manifest.projects || {};
    var keys = Object.keys(projects);

    document.getElementById('project-count').textContent = keys.length + ' project' + (keys.length !== 1 ? 's' : '');

    keys.forEach(function(slug, i) {
      var p = projects[slug];
      var screens = countScreens(p);
      var thumbCount = screens <= 2 ? 1 : (screens <= 5 ? 2 : 3);
      var statusClass = p.status === 'draft' ? 'status-draft' : 'status-active';
      var statusLabel = p.status === 'draft' ? 'Draft' : 'Active';

      var card = document.createElement('a');
      card.className = 'project-card';
      card.href = 'projects/' + slug + '/index.html';

      var thumbsHtml = '';
      for (var t = 0; t < thumbCount; t++) {
        thumbsHtml += buildThumb(i + t);
      }

      card.innerHTML =
        '<div class="card-preview">' + thumbsHtml + '</div>' +
        '<div class="card-body">' +
          '<h3>' + p.name + '</h3>' +
          '<p>' + p.description + '</p>' +
          '<div class="card-tags">' +
            '<span class="tag screens">' + screens + ' screen' + (screens !== 1 ? 's' : '') + '</span>' +
            '<span class="tag ' + statusClass + '">' + statusLabel + '</span>' +
          '</div>' +
        '</div>';

      grid.appendChild(card);
    });

    var addCard = document.createElement('div');
    addCard.className = 'project-card add-new';
    addCard.innerHTML = '<div class="add-new-content"><div class="plus">+</div><div>New Project</div></div>';
    grid.appendChild(addCard);
  });
</script>

</body>
</html>
